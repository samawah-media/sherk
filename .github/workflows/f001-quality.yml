name: F-001 Quality

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npx supabase@2.107.0 db start
      - run: npx supabase@2.107.0 db reset --local
      - run: npm run test:rls
      - run: npm run test:component
      - run: npm run test:e2e:list
      - run: npm run secret:scan
      - run: npm run build
